<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frota de Veículos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
    /* ── VAZIO / ERRO ── */
    .empty-msg {
      text-align: center;
      padding: 3rem 1rem;
      color: #aaa;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<!-- TOPO -->
<div class="topbar">
  <div>
    <h1>&#128663; Frota de Veículos</h1>
    <div class="topbar-meta" id="ultima-atualizacao">Carregando...</div>
  </div>
  <span id="badge-status" class="loading">Carregando...</span>
</div>

<!-- CARDS RESUMO -->
<div class="stats-row">
  <div class="stat-card total">
    <div class="label">Total</div>
    <div class="value" id="stat-total">—</div>
  </div>
  <div class="stat-card green">
    <div class="label">Alugados</div>
    <div class="value" id="stat-alugado">—</div>
  </div>
  <div class="stat-card blue">
    <div class="label">Disponíveis</div>
    <div class="value" id="stat-disponivel">—</div>
  </div>
  <div class="stat-card amber">
    <div class="label">Manutenção</div>
    <div class="value" id="stat-manutencao">—</div>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <input type="text" id="busca" placeholder="Buscar por placa, motorista ou modelo...">
  <select id="filtro-status">
    <option value="">Todos os status</option>
  </select>
  <select id="filtro-fabricante">
    <option value="">Todos os fabricantes</option>
  </select>
  <button id="btn-exportar" onclick="exportarXLSX()" style="height:38px;padding:0 16px;border:1px solid #1a1a2e;border-radius:8px;background:#1a1a2e;color:white;font-size:0.85rem;cursor:pointer;white-space:nowrap;">
    &#11015; Exportar Excel
  </button>
</div>

<!-- TABELA -->
<div class="table-wrap">
  <table id="tabela">
    <thead>
      <tr>
        <th>Placa</th>
        <th>Modelo</th>
        <th>Fabricante</th>
        <th>Cor</th>
        <th>Motorista</th>
        <th>Status</th>
        <th style="width:40px"></th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="7" class="empty-msg">Carregando dados...</td></tr>
    </tbody>
  </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbx9LxEgTKrKBwk28VUWV0kS5GeiR5Sl-nPdbgnDyI6Adthb_HwkatK3SPEku_48GFwL/exec';
  const INTERVALO_HORAS = 4;

  let dadosCompletos = [];
  let expandidoIndex = null;

  function badgeStatus(status) {
    if (!status) return `<span class="badge badge-gray">—</span>`;
    const s = status.toLowerCase();
    if (s.includes('alugado'))    return `<span class="badge badge-green">${status}</span>`;
    if (s.includes('disponív'))   return `<span class="badge badge-blue">${status}</span>`;
    if (s.includes('manuten'))    return `<span class="badge badge-amber">${status}</span>`;
    if (s.includes('sinistro') || s.includes('baixa')) return `<span class="badge badge-red">${status}</span>`;
    return `<span class="badge badge-gray">${status}</span>`;
  }

  function popularFiltros(dados) {
    const statuses    = [...new Set(dados.map(d => d['Status']).filter(Boolean))].sort();
    const fabricantes = [...new Set(dados.map(d => d['Fabricante']).filter(Boolean))].sort();

    const selStatus = document.getElementById('filtro-status');
    const selFab    = document.getElementById('filtro-fabricante');
    const currentStatus = selStatus.value;
    const currentFab    = selFab.value;

    selStatus.innerHTML    = '<option value="">Todos os status</option>';
    selFab.innerHTML       = '<option value="">Todos os fabricantes</option>';
    statuses.forEach(s    => selStatus.innerHTML    += `<option value="${s}">${s}</option>`);
    fabricantes.forEach(f => selFab.innerHTML       += `<option value="${f}">${f}</option>`);

    selStatus.value = currentStatus;
    selFab.value    = currentFab;
  }

  function atualizarStats(dados) {
    document.getElementById('stat-total').textContent      = dados.length;
    document.getElementById('stat-alugado').textContent    = dados.filter(d => (d['Status']||'').toLowerCase().includes('alugado')).length;
    document.getElementById('stat-disponivel').textContent = dados.filter(d => (d['Status']||'').toLowerCase().includes('disponív')).length;
    document.getElementById('stat-manutencao').textContent = dados.filter(d => (d['Status']||'').toLowerCase().includes('manuten')).length;
  }

  function dadosFiltrados() {
    const busca = document.getElementById('busca').value.toLowerCase();
    const status = document.getElementById('filtro-status').value;
    const fabricante = document.getElementById('filtro-fabricante').value;

    return dadosCompletos.filter(d => {
      const matchBusca = !busca ||
        (d['Placa']||'').toLowerCase().includes(busca) ||
        (d['Nome do motorista']||'').toLowerCase().includes(busca) ||
        (d['Modelo']||'').toLowerCase().includes(busca);
      const matchStatus    = !status    || d['Status']    === status;
      const matchFabricante = !fabricante || d['Fabricante'] === fabricante;
      return matchBusca && matchStatus && matchFabricante;
    });
  }

  function renderTabela() {
    const dados = dadosFiltrados();
    const tbody = document.getElementById('tbody');

    if (!dados.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty-msg">Nenhum veículo encontrado.</td></tr>';
      return;
    }

    let html = '';
    dados.forEach((d, i) => {
      const expandido = expandidoIndex === i;
      html += `
        <tr data-index="${i}" class="${expandido ? 'expanded' : ''}" onclick="toggleDetalhe(${i})">
          <td><span class="placa">${d['Placa'] || '—'}</span></td>
          <td>${d['Modelo'] || '—'}</td>
          <td>${d['Fabricante'] || '—'}</td>
          <td>${d['Cor'] || '—'}</td>
          <td>${d['Nome do motorista'] || '—'}</td>
          <td>${badgeStatus(d['Status'])}</td>
          <td><span class="icon-expand">${expandido ? '▲' : '▼'}</span></td>
        </tr>`;

      if (expandido) {
        html += `
        <tr class="detail-row">
          <td colspan="7">
            <div class="detail-panel">
              <h3>Informações do veículo</h3>
              <div class="detail-grid">
                <div class="detail-field"><div class="field-label">Placa</div><div class="field-value mono">${d['Placa'] || '—'}</div></div>
                <div class="detail-field"><div class="field-label">Chassi</div><div class="field-value mono">${d['Chassi'] || '—'}</div></div>
                <div class="detail-field"><div class="field-label">Renavam</div><div class="field-value mono">${d['Renavam'] || '—'}</div></div>
                <div class="detail-field"><div class="field-label">Fabricante</div><div class="field-value">${d['Fabricante'] || '—'}</div></div>
                <div class="detail-field"><div class="field-label">Modelo</div><div class="field-value">${d['Modelo'] || '—'}</div></div>
                <div class="detail-field"><div class="field-label">Cor</div><div class="field-value">${d['Cor'] || '—'}</div></div>
                <div class="detail-field"><div class="field-label">Ano Veículo</div><div class="field-value">${d['Ano Veículo'] || '—'}</div></div>
                <div class="detail-field"><div class="field-label">Ano Modelo</div><div class="field-value">${d['Ano Modelo'] || '—'}</div></div>
                <div class="detail-field"><div class="field-label">Motorista</div><div class="field-value">${d['Nome do motorista'] || '—'}</div></div>
                <div class="detail-field"><div class="field-label">CPF</div><div class="field-value mono">${d['CPF'] || '—'}</div></div>
                <div class="detail-field"><div class="field-label">Telefone</div><div class="field-value mono">${d['Telefone'] || '—'}</div></div>
                <div class="detail-field"><div class="field-label">Status</div><div class="field-value">${badgeStatus(d['Status'])}</div></div>
              </div>
            </div>
          </td>
        </tr>`;
      }
    });

    tbody.innerHTML = html;
  }

  function toggleDetalhe(index) {
    expandidoIndex = expandidoIndex === index ? null : index;
    renderTabela();
  }

  function exportarXLSX() {
    if (!dadosCompletos.length) return alert('Nenhum dado carregado para exportar.');

    const substatusMap = {
      'alugado':        'EM CONTRATO',
      'oficina':        'EM MANUTENÇÃO',
      'atribuído':      'RESERVADO',
      'disponível':     'DISPONÍVEL LOCAÇÃO',
      'em preparação':  'VISTORIA VEICULAR',
      'perda total':    'VENDIDO'
    };

    const linhas = dadosCompletos.map(d => {
      const status = d['Status'] || '';
      const substatus = substatusMap[(status).toLowerCase()] || '';
      return {
        'PLACA':                  d['Placa']              || '',
        'CHASSI':                 d['Chassi']             || '',
        'MODELO':                 d['Modelo']             || '',
        'FABRICANTE':             d['Fabricante']         || '',
        'KM ATUAL':               '',
        'COR':                    d['Cor']                || '',
        'RENAVAM':                d['Renavam']            || '',
        'ANO VEÍCULO':            d['Ano Veículo']        || '',
        'ANO MODELO':             d['Ano Modelo']         || '',
        'TELEFONE':               d['Telefone']           || '',
        'LOCATÁRIO':              d['Nome do motorista']  || '',
        'CPF':                    d['CPF']                || '',
        'PROPRIETÁRIO':           'LM FROTAS',
        'OPERAÇÃO':               'OPERAÇÃO',
        'STATUS':                 status,
        'OBSERVAÇÃO DO STATUS':   '',
        'SUBSTATUS':              substatus,
        'INÍCIO STATUS ATUAL':    '',
        'RASTREADOR':             'SMARTGPS'
      };
    });

    const ws = XLSX.utils.json_to_sheet(linhas);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Frota');

    const hoje = new Date().toLocaleDateString('pt-BR').replace(/\//g, '.');
    XLSX.writeFile(wb, `(${hoje}) FROTA_STATUS DIÁRIA OCN BRASIL.xlsx`);
  }

  async function carregarDados() {
    const badge = document.getElementById('badge-status');
    badge.textContent = 'Atualizando...';
    badge.className = 'loading';

    try {
      const res  = await fetch('./data.json');
      const json = await res.json();

      dadosCompletos = json.filter(d => d['Placa']);
      popularFiltros(dadosCompletos);
      atualizarStats(dadosCompletos);
      renderTabela();

      const agora = new Date().toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
      document.getElementById('ultima-atualizacao').textContent = `Última atualização: ${agora}`;
      badge.textContent = 'Atualizado ✓';
      badge.className = 'ok';

    } catch (err) {
      badge.textContent = 'Erro ao carregar';
      badge.className = 'error';
      console.error(err);
    } 
  }

  document.getElementById('busca').addEventListener('input', () => { expandidoIndex = null; renderTabela(); });
  document.getElementById('filtro-status').addEventListener('change', () => { expandidoIndex = null; renderTabela(); });
  document.getElementById('filtro-fabricante').addEventListener('change', () => { expandidoIndex = null; renderTabela(); });

  carregarDados();
  setInterval(carregarDados, INTERVALO_HORAS * 60 * 60 * 1000);
</script>
</body>
</html>
